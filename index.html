<!DOCTYPE html>
<html>

<head>
<title>Minha Bio</title>

<style>

body{
margin:0;
height:100vh;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
background: linear-gradient(to bottom, #2a0050, #0a0015, #000000);
cursor:none;
}

/* imagens laterais */

.side-img{
position:fixed;
width:260px;   /* aumentei mais um pouco */
opacity:0.9;
z-index:1;
pointer-events:none;
}

/* esquerda */

.left1{
left:40px;
top:80px;
}

.left2{
left:60px;
bottom:100px;
}

/* direita */

.right1{
right:40px;
top:100px;
}

.right2{
right:40px;
bottom:260px;   /* esta fica mais acima */
}

.right3{
right:220px;
bottom:60px;    /* esta vai mais para a esquerda */
}
  
/* cursor */

.cursor{
position:fixed;
width:12px;
height:12px;
background:#9b4dff;
border-radius:50%;
pointer-events:none;
z-index:999;
box-shadow:0 0 10px #9b4dff;
transform:translate(-50%,-50%);
}

/* clique */

.click-effect{
position:fixed;
width:10px;
height:10px;
border:2px solid #9b4dff;
border-radius:50%;
pointer-events:none;
animation:clickAnim 0.6s ease-out;
z-index:998;
}

@keyframes clickAnim{
from{transform:translate(-50%,-50%) scale(0.5);opacity:1;}
to{transform:translate(-50%,-50%) scale(6);opacity:0;}
}

/* estrelas */

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.star{
position:absolute;
background:white;
border-radius:50%;
}

/* card */

.card{
position:relative;
margin-top:120px;
z-index:2;
}

img{
width:130px;
border-radius:50%;
}

/* links */

.link{
display:block;
margin:15px;
padding:12px;
border:1px solid white;
border-radius:10px;
color:white;
text-decoration:none;
width:200px;
margin-left:auto;
margin-right:auto;
cursor:pointer;
}

.link:hover{
background:white;
color:black;
}

/* menu */

.menu-btn{
position:fixed;
top:20px;
right:20px;
font-size:22px;
cursor:pointer;
z-index:5;
}

/* jogos */

.games-panel{
position:fixed;
top:0;
right:-260px;
width:260px;
height:100%;
background:rgba(0,0,0,0.9);
padding-top:60px;
transition:0.4s;
z-index:4;
}

.games-panel.open{
right:0;
}

.games-title{
text-align:center;
font-size:18px;
margin-bottom:20px;
}

.game{
width:180px;
margin:20px auto;
padding:15px;
border:1px solid white;
border-radius:8px;
cursor:pointer;
}

.game:hover{
background:white;
color:black;
}

/* player */

.player{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
z-index:3;
}

button{
background:none;
border:1px solid white;
color:white;
padding:5px 10px;
margin-right:10px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:white;
color:black;
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<!-- imagens decorativas -->

<img class="side-img left1" src="https://i.pinimg.com/736x/38/eb/62/38eb62678a06816f1b2801b83b138145.jpg">
<img class="side-img left2" src="https://i.pinimg.com/736x/21/41/84/2141844e1cd9f8719749e616b8bdee37.jpg">
<img class="side-img right1" src="https://i.pinimg.com/736x/e5/0c/d4/e50cd4c6f0431c6893e681053b1ababe.jpg">
<img class="side-img right2" src="https://i.pinimg.com/736x/d7/42/66/d7426626af0ca4ef9695c3379949b25d.jpg">
<img class="side-img right3" src="https://i.pinimg.com/736x/e0/7c/56/e07c56c1615d2c0bc7a9fe4a72c30fed.jpg">

<div id="stars"></div>

<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div id="gamesPanel" class="games-panel">

<div class="games-title">Jogos atualmente</div>

<div class="game" onclick="copyNick('henras#diaxx')">Valorant</div>

<div class="game" onclick="copyNick('henrsix7')">Fortnite</div>

<div class="game" onclick="copyNick('')">Minecraft</div>

</div>

<div class="card">

<img src="https://i.pinimg.com/736x/94/4c/5f/944c5ff43c2bf7c5065c99038e5ccf79.jpg">

<h1>Henrique</h1>

<p>Minha bio</p>

<a class="link" href="https://instagram.com/henriqu_md" target="_blank">Instagram</a>

<a class="link" onclick="copyDiscord()">Copiar Discord</a>

</div>

<div class="player">
<button onclick="toggleMusic()">Mute</button>
<input type="range" min="0" max="1" step="0.01" value="0.5" oninput="changeVolume(this.value)">
</div>

<audio id="music" loop>
<source src="racionais.mp3" type="audio/mpeg">
</audio>

<script>

/* cursor */

const cursor = document.getElementById("cursor");

document.addEventListener("mousemove",(e)=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});

/* clique */

document.addEventListener("click",(e)=>{

let bubble=document.createElement("div");
bubble.className="click-effect";

bubble.style.left=e.clientX+"px";
bubble.style.top=e.clientY+"px";

document.body.appendChild(bubble);

setTimeout(()=>bubble.remove(),600);

});

/* musica */

const music=document.getElementById("music");

document.addEventListener("click",()=>{
music.volume=0.5;
music.play();
},{once:true});

function toggleMusic(){
music.muted=!music.muted;
}

function changeVolume(v){
music.volume=v;
}

/* discord */

function copyDiscord(){
navigator.clipboard.writeText("henrique799m");
alert("Discord copiado: henrique799m");
}

/* jogos */

function copyNick(nick){

if(nick===""){
alert("Nick não definido ainda");
return;
}

navigator.clipboard.writeText(nick);
alert("Nick copiado: "+nick);

}

/* menu */

function toggleMenu(){
document.getElementById("gamesPanel").classList.toggle("open");
}

/* estrelas */

const starsContainer=document.getElementById("stars");
const stars=[];

for(let i=0;i<1200;i++){

let star=document.createElement("div");
star.className="star";

let size=Math.random()*2+0.5;

star.style.width=size+"px";
star.style.height=size+"px";

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

star.style.left=x+"px";
star.style.top=y+"px";

starsContainer.appendChild(star);

stars.push({
element:star,
x:x,
y:y,
speed:0.1+Math.random()*0.5
});

}

function animateStars(){

for(let star of stars){

star.y-=star.speed;

if(star.y<-10){
star.y=window.innerHeight+10;
star.x=Math.random()*window.innerWidth;
}

star.element.style.top=star.y+"px";

}

requestAnimationFrame(animateStars);

}

animateStars();

</script>

</body>
</html>
