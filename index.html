<!DOCTYPE html>
<html>

<head>
<title>Minha Bio</title>

<style>

body{
margin:0;
height:100vh;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
background: linear-gradient(to bottom, #2a0050, #0a0015, #000000);
}

/* container */

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* estrela */

.star{
position:absolute;
background:white;
border-radius:50%;
}

/* card */

.card{
position:relative;
margin-top:120px;
z-index:2;
}

img{
width:130px;
border-radius:50%;
}

.link{
display:block;
margin:15px;
padding:12px;
border:1px solid white;
border-radius:10px;
color:white;
text-decoration:none;
width:200px;
margin-left:auto;
margin-right:auto;
}

.link:hover{
background:white;
color:black;
}

</style>
</head>

<body>

<div id="stars"></div>

<div class="card">

<img src="https://i.pinimg.com/736x/94/4c/5f/944c5ff43c2bf7c5065c99038e5ccf79.jpg">

<h1>Henrique</h1>

<p>Minha bio</p>

<a class="link" href="https://instagram.com/henriqu_md" target="_blank">Instagram</a>
<a class="link" href="https://discord.com/users/1433597878185627704" target="_blank">Discord</a>

</div>

<script>

const starsContainer = document.getElementById("stars");
const stars = [];

/* cria estrelas */

for(let i=0;i<1200;i++){

let star = document.createElement("div");
star.className = "star";

let size = Math.random()*2 + 0.5;

star.style.width = size+"px";
star.style.height = size+"px";

let x = Math.random()*window.innerWidth;
let y = Math.random()*window.innerHeight;

star.style.left = x+"px";
star.style.top = y+"px";

starsContainer.appendChild(star);

stars.push({
element:star,
x:x,
y:y,
speed:0.1 + Math.random()*0.5
});

}

/* animação infinita */

function animateStars(){

for(let star of stars){

star.y -= star.speed;

if(star.y < -10){
star.y = window.innerHeight + 10;
star.x = Math.random()*window.innerWidth;
}

star.element.style.top = star.y+"px";

}

requestAnimationFrame(animateStars);

}

animateStars();

</script>

</body>

</html>
