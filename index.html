<!DOCTYPE html>
<html>

<head>

<title>Minha Bio</title>

<style>

body{
margin:0;
height:100vh;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
background: linear-gradient(to bottom, #2a0050, #0a0015, #000000);
background-attachment: fixed;
}

.stars{
animation: animStars 80s linear infinite;
}

.stars2{
animation: animStars2 120s linear infinite;
opacity:0.6;
}

@keyframes animStars2{
from{
transform: translate(0,0);
}
to{
transform: translate(300px,-500px);
}
}
  
.card{
position:relative;
margin-top:120px;
z-index:2;
}

img{
width:130px;
border-radius:50%;
}

.link{
display:block;
margin:15px;
padding:12px;
border:1px solid white;
border-radius:10px;
color:white;
text-decoration:none;
width:200px;
margin-left:auto;
margin-right:auto;
}

.link:hover{
background:white;
color:black;
}

</style>

</head>

<body>

<div class="stars"></div>
<div class="stars2"></div>

<div class="card">

<img src="https://i.pinimg.com/736x/94/4c/5f/944c5ff43c2bf7c5065c99038e5ccf79.jpg">

<h1>Henrique</h1>

<p>Minha bio</p>

<a class="link" href="#">Instagram</a>
<a class="link" href="#">Discord</a>

</div>

</body>

</html>
