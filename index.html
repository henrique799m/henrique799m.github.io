<!DOCTYPE html>
<html>

<head>

<title>Minha Bio</title>

<style>

body{
margin:0;
height:100vh;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
background: linear-gradient(to bottom, #2a0050, #000000);
}

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation: animStars 60s linear infinite;
}

@keyframes animStars{
from{
transform:translateY(0);
}
to{
transform:translateY(-1000px);
}
}

.card{
position:relative;
margin-top:120px;
z-index:2;
}

img{
width:130px;
border-radius:50%;
}

.link{
display:block;
margin:15px;
padding:12px;
border:1px solid white;
border-radius:10px;
color:white;
text-decoration:none;
width:200px;
margin-left:auto;
margin-right:auto;
}

.link:hover{
background:white;
color:black;
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="card">

<img src="https://i.pinimg.com/736x/94/4c/5f/944c5ff43c2bf7c5065c99038e5ccf79.jpg">

<h1>Henrique</h1>

<p>Minha bio</p>

<a class="link" href="#">Instagram</a>
<a class="link" href="#">Discord</a>

</div>

</body>

</html>
