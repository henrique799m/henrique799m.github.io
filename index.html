<!DOCTYPE html>
<html>

<head>
<title>Minha Bio</title>

<style>

body{
margin:0;
height:100vh;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
background: linear-gradient(to bottom, #2a0050, #0a0015, #000000);
}

/* container das estrelas */

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

/* estrela */

.star{
position:absolute;
background:white;
border-radius:50%;
animation: moveStar linear infinite;
}

/* movimento */

@keyframes moveStar{
from{
transform:translateY(0);
}
to{
transform:translateY(-120vh);
}
}

/* card */

.card{
position:relative;
margin-top:120px;
z-index:2;
}

img{
width:130px;
border-radius:50%;
}

.link{
display:block;
margin:15px;
padding:12px;
border:1px solid white;
border-radius:10px;
color:white;
text-decoration:none;
width:200px;
margin-left:auto;
margin-right:auto;
}

.link:hover{
background:white;
color:black;
}

</style>
</head>

<body>

<div id="stars"></div>

<div class="card">

<img src="https://i.pinimg.com/736x/94/4c/5f/944c5ff43c2bf7c5065c99038e5ccf79.jpg">

<h1>Henrique</h1>

<p>Minha bio</p>

<a class="link" href="#">Instagram</a>
<a class="link" href="#">Discord</a>

</div>

<script>

const starsContainer = document.getElementById("stars");

/* quantidade de estrelas */

for(let i=0;i<1000;i++){

let star = document.createElement("div");
star.className = "star";

/* posição aleatória */

star.style.left = Math.random()*100+"vw";
star.style.top = Math.random()*100+"vh";

/* tamanho aleatório */

let size = Math.random()*2 + 1;
star.style.width = size+"px";
star.style.height = size+"px";

/* velocidade aleatória */

star.style.animationDuration = (60 + Math.random()*60)+"s";

/* brilho */

star.style.opacity = 0.3 + Math.random()*0.7;

starsContainer.appendChild(star);

}

</script>

</body>
</html>
