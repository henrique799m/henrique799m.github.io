<!DOCTYPE html>
<html>

<head>

<title>Minha Bio</title>

<style>

body{
margin:0;
height:100vh;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
background: linear-gradient(to bottom, #2a0050, #0a0015, #000000);
background-attachment: fixed;
}

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:transparent;
box-shadow:
100px 200px white,
300px 400px white,
500px 100px white,
700px 600px white,
900px 300px white,
1100px 500px white,
200px 800px white,
400px 900px white,
600px 700px white,
800px 1000px white,
1000px 1200px white,
1200px 300px white;
animation: starsMove 120s linear infinite;
}

@keyframes starsMove{
from{
transform:translateY(0);
}
to{
transform:translateY(-1000px);
}
}
  
.card{
position:relative;
margin-top:120px;
z-index:2;
}

img{
width:130px;
border-radius:50%;
}

.link{
display:block;
margin:15px;
padding:12px;
border:1px solid white;
border-radius:10px;
color:white;
text-decoration:none;
width:200px;
margin-left:auto;
margin-right:auto;
}

.link:hover{
background:white;
color:black;
}

</style>

</head>

<body>

<div class="stars"></div>

<div class="card">

<img src="https://i.pinimg.com/736x/94/4c/5f/944c5ff43c2bf7c5065c99038e5ccf79.jpg">

<h1>Henrique</h1>

<p>Minha bio</p>

<a class="link" href="#">Instagram</a>
<a class="link" href="#">Discord</a>

</div>

</body>

</html>
