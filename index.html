<!DOCTYPE html>
<html>

<head>
<title>Minha Bio</title>

<style>

body{
margin:0;
height:100vh;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
background: linear-gradient(to bottom, #2a0050, #0a0015, #000000);
}

/* estrelas */

#stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
}

.star{
position:absolute;
background:white;
border-radius:50%;
}

/* card */

.card{
position:relative;
margin-top:120px;
z-index:2;
}

img{
width:130px;
border-radius:50%;
}

/* links */

.link{
display:block;
margin:15px;
padding:12px;
border:1px solid white;
border-radius:10px;
color:white;
text-decoration:none;
width:200px;
margin-left:auto;
margin-right:auto;
cursor:pointer;
}

.link:hover{
background:white;
color:black;
}

/* player */

.player{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
padding:10px;
border-radius:10px;
z-index:3;
}

button{
background:none;
border:1px solid white;
color:white;
padding:5px 10px;
margin-right:10px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:white;
color:black;
}

</style>
</head>

<body>

<div id="stars"></div>

<div class="card">

<img src="https://i.pinimg.com/736x/94/4c/5f/944c5ff43c2bf7c5065c99038e5ccf79.jpg">

<h1>Henrique</h1>

<p>Minha bio</p>

<a class="link" href="https://instagram.com/henriqu_md" target="_blank">Instagram</a>

<a class="link" onclick="copyDiscord()">Copiar Discord</a>

</div>

<!-- PLAYER -->

<div class="player">

<button onclick="toggleMusic()">Mute</button>

<input type="range" min="0" max="1" step="0.01" value="0.5" onchange="changeVolume(this.value)">

</div>

<audio id="music" loop>
<source src="racionais.mp3" type="audio/mpeg">
</audio>

<script>
document.addEventListener("click", function(){
document.getElementById("music").play();
},{ once:true });
</script>

<script>

/* copiar discord */

function copyDiscord(){
navigator.clipboard.writeText("henrique799m");
alert("Discord copiado: henrique799m");
}

/* player */

const music = document.getElementById("music");

function toggleMusic(){

if(music.muted){
music.muted=false;
}else{
music.muted=true;
}

}

function changeVolume(value){
music.volume = value;
}

/* estrelas */

const starsContainer = document.getElementById("stars");
const stars = [];

for(let i=0;i<1200;i++){

let star = document.createElement("div");
star.className="star";

let size = Math.random()*2+0.5;

star.style.width=size+"px";
star.style.height=size+"px";

let x=Math.random()*window.innerWidth;
let y=Math.random()*window.innerHeight;

star.style.left=x+"px";
star.style.top=y+"px";

starsContainer.appendChild(star);

stars.push({
element:star,
x:x,
y:y,
speed:0.1+Math.random()*0.5
});

}

function animateStars(){

for(let star of stars){

star.y -= star.speed;

if(star.y < -10){
star.y = window.innerHeight + 10;
star.x = Math.random()*window.innerWidth;
}

star.element.style.top = star.y+"px";

}

requestAnimationFrame(animateStars);

}

animateStars();

</script>
</body>
</html>
